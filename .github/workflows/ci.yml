name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check startup elevation policy
        shell: pwsh
        run: ./scripts/Assert-StartupElevationPolicy.ps1

      - name: Setup .NET from global.json
        if: ${{ hashFiles('global.json') != '' }}
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup .NET 10 (fallback)
        if: ${{ hashFiles('global.json') == '' }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Tools.sln

      - name: Build
        run: dotnet build Tools.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Tools.sln --configuration Release --no-build

      - name: Audit vulnerable packages
        run: dotnet list Tools.sln package --vulnerable --include-transitive

      - name: Audit deprecated packages
        run: dotnet list Tools.sln package --deprecated

      - name: Publish PR preview
        if: ${{ github.event_name == 'pull_request' }}
        shell: pwsh
        run: |
          dotnet publish NVConso/NVConso.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output artifacts/pr-preview/WattPilot-win-x64

      - name: Package PR preview
        if: ${{ github.event_name == 'pull_request' }}
        shell: pwsh
        run: |
          $zipPath = "artifacts/pr-preview/WattPilot-pr-preview-win-x64.zip"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive `
            -Path "artifacts/pr-preview/WattPilot-win-x64/*" `
            -DestinationPath $zipPath

      - name: Upload PR preview
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: WattPilot-pr-preview-win-x64
          path: artifacts/pr-preview/WattPilot-pr-preview-win-x64.zip
          if-no-files-found: error
