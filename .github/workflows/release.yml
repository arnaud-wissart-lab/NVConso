name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  SOLUTION_PATH: Tools.sln
  PROJECT_PATH: NVConso/NVConso.csproj
  RUNTIME_IDENTIFIER: win-x64
  VELOPACK_VERSION: 1.2.0

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET from global.json
        if: ${{ hashFiles('global.json') != '' }}
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup .NET 8 fallback
        if: ${{ hashFiles('global.json') == '' }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Le tag '$tag' est invalide. Format attendu : vX.Y.Z, par exemple v1.4.0."
          }

          $version = $Matches.version
          $assemblyVersion = "$version.0"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $informationalVersion = "$version+$shortSha"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVersion" >> $env:GITHUB_OUTPUT
          "informational_version=$informationalVersion" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT

          Write-Host "Version package : $version"
          Write-Host "AssemblyVersion/FileVersion : $assemblyVersion"
          Write-Host "InformationalVersion : $informationalVersion"

      - name: Generate release notes
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $previousTag = git tag --sort=-version:refname |
            Where-Object { $_ -ne $tag -and $_ -match '^v\d+\.\d+\.\d+$' } |
            Select-Object -First 1

          $range = if ($previousTag) { "$previousTag..$tag" } else { $tag }
          $commits = git log $range --pretty=format:"- %s (%h)"

          $lines = @()
          $lines += "## NVConso $tag"
          $lines += ""
          if ($previousTag) {
            $lines += "Comparaison : https://github.com/${{ github.repository }}/compare/$previousTag...$tag"
          } else {
            $lines += "Première release taguée détectée dans ce dépôt."
          }
          $lines += ""
          $lines += "### Changements"
          if ($commits) {
            $lines += $commits
          } else {
            $lines += "- Aucun commit listé pour ce tag."
          }

          $lines | Set-Content -Path release-notes.md -Encoding UTF8

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: >
          dotnet build ${{ env.SOLUTION_PATH }}
          --configuration Release
          --no-restore
          -p:ContinuousIntegrationBuild=true
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.version.outputs.informational_version }}

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build

      - name: Audit vulnerable packages
        run: dotnet list ${{ env.SOLUTION_PATH }} package --vulnerable --include-transitive

      - name: Audit deprecated packages
        run: dotnet list ${{ env.SOLUTION_PATH }} package --deprecated

      - name: Publish win-x64 self-contained
        shell: pwsh
        run: |
          $publishDir = Join-Path $pwd "artifacts/publish/${{ env.RUNTIME_IDENTIFIER }}"
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null

          dotnet publish "${{ env.PROJECT_PATH }}" `
            -c Release `
            -r "${{ env.RUNTIME_IDENTIFIER }}" `
            --self-contained true `
            -o "$publishDir" `
            -p:PlatformTarget=x64 `
            -p:ContinuousIntegrationBuild=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} `
            -p:FileVersion=${{ steps.version.outputs.assembly_version }} `
            -p:InformationalVersion=${{ steps.version.outputs.informational_version }} `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $publishDir = Join-Path $pwd "artifacts/publish/${{ env.RUNTIME_IDENTIFIER }}"
          $releaseDir = Join-Path $pwd "artifacts/release"
          $zipPath = Join-Path $releaseDir "NVConso-win-x64.zip"

          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $zipPath

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          dotnet tool install --global vpk --version "${{ env.VELOPACK_VERSION }}"
          $toolPath = Join-Path $env:USERPROFILE ".dotnet\tools"
          $toolPath >> $env:GITHUB_PATH
          & (Join-Path $toolPath "vpk.exe") --version

      - name: Restore previous Velopack feed
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $velopackDir = Join-Path $pwd "artifacts/velopack/${{ env.RUNTIME_IDENTIFIER }}"
          New-Item -ItemType Directory -Path $velopackDir -Force | Out-Null

          try {
            vpk download github `
              --repoUrl "https://github.com/${{ github.repository }}" `
              --token "$env:GITHUB_TOKEN" `
              --channel stable `
              --outputDir "$velopackDir" `
              --timeout 10
          } catch {
            Write-Warning "Aucune release Velopack précédente récupérable. Un paquet complet sera généré sans delta. $($_.Exception.Message)"
          }

      - name: Package Velopack stable
        shell: pwsh
        run: |
          $publishDir = Join-Path $pwd "artifacts/publish/${{ env.RUNTIME_IDENTIFIER }}"
          $velopackDir = Join-Path $pwd "artifacts/velopack/${{ env.RUNTIME_IDENTIFIER }}"

          vpk pack `
            --packId NVConso `
            --packVersion "${{ steps.version.outputs.version }}" `
            --packDir "$publishDir" `
            --mainExe NVConso.exe `
            --channel stable `
            --runtime "${{ env.RUNTIME_IDENTIFIER }}" `
            --packAuthors "Arnaud Wissart" `
            --packTitle NVConso `
            --releaseNotes release-notes.md `
            --icon "NVConso/Assets/NVConso.ico" `
            --outputDir "$velopackDir"

      - name: Collect release assets
        shell: pwsh
        run: |
          $releaseDir = Join-Path $pwd "artifacts/release"
          $velopackDir = Join-Path $pwd "artifacts/velopack/${{ env.RUNTIME_IDENTIFIER }}"

          Copy-Item -Path (Join-Path $velopackDir '*') -Destination $releaseDir -Force

          $files = Get-ChildItem -Path $releaseDir -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            Sort-Object Name

          if (-not $files) {
            throw "Aucun artefact de release trouvé."
          }

          $checksums = foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }

          $checksums | Set-Content -Path (Join-Path $releaseDir "SHA256SUMS.txt") -Encoding ASCII
          Get-ChildItem -Path $releaseDir -File | Sort-Object Name | ForEach-Object { Write-Host $_.Name }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: NVConso ${{ github.ref_name }}
          body_path: release-notes.md
          files: artifacts/release/*
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
